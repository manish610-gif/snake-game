<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#1f8f3a,#9bdc28);
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  padding:20px;
  min-height:100vh;
}

/* BOARD */
#board{
  position:relative;
  width:90vmin;
  max-width:650px;
  aspect-ratio:1/1;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* TOKENS */
.player{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  z-index:5;
  border:2px solid white;
}

#p1{background:#ff3b3b;}
#p2{background:#1e90ff;}
#p3{background:#ffd700;}
#p4{background:#8a2be2;}

/* PANEL */
.panel{
  width:330px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.panel h2{
  margin-top:0;
  text-align:center;
  color:#1f8f3a;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#1f8f3a;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#166b2b;
}

#turn{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  color:#333;
}

/* DICE */
.dice{
  width:80px;
  height:80px;
  margin:20px auto;
  background:white;
  border-radius:15px;
  box-shadow:inset 0 0 15px rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
  transition:transform 0.4s ease;
}

.roll-anim{
  animation:spin 0.6s linear;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

#score{
  margin-top:15px;
  font-size:14px;
}

@media(max-width:1000px){
  .wrapper{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div id="board">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
    <div id="p3" class="player"></div>
    <div id="p4" class="player"></div>
  </div>

  <div class="panel">
    <h2>Snake & Ladder</h2>

    <input id="name1" placeholder="Player 1">
    <input id="name2" placeholder="Player 2">
    <input id="name3" placeholder="Player 3">
    <input id="name4" placeholder="Player 4">

    <button onclick="startGame()">Start Game</button>

    <div id="turn">Turn: -</div>

    <div id="dice" class="dice">🎲</div>

    <button onclick="rollDice()">Roll Dice</button>
    <button onclick="restart()">Restart</button>

    <div id="score"></div>
  </div>

</div>

<script>

const snakesAndLadders={
  17:37,20:42,27:46,32:52,55:75,77:94,81:93,
  22:18,34:12,43:23,56:35,64:48,71:68,79:62,98:86
};

let players=[];
let positions=[1,1,1,1];
let scores=[0,0,0,0];
let currentPlayer=0;
let moving=false;

function startGame(){
  players=[
    name1.value||"Player 1",
    name2.value||"Player 2",
    name3.value||"Player 3",
    name4.value||"Player 4"
  ];
  updateTurn();
  updateScore();
}

function getCoords(pos){
  const board=document.getElementById("board");
  const size=board.clientWidth;
  const cell=size/10;
  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;
  if(row%2===1) col=9-col;

  return{
    left:col*cell + (cell/2) - 9,
    top:size - ((row+1)*cell) + (cell/2) - 9
  };
}

function updateToken(i){
  const t=document.getElementById("p"+(i+1));
  const c=getCoords(positions[i]);
  t.style.left=c.left+"px";
  t.style.top=c.top+"px";
}

function rollDice(){
  if(moving || players.length===0) return;

  moving=true;
  let diceEl=document.getElementById("dice");
  diceEl.classList.add("roll-anim");

  let dice=Math.floor(Math.random()*6)+1;

  setTimeout(()=>{
    diceEl.classList.remove("roll-anim");
    diceEl.innerText=dice;
    moveStep(dice);
  },600);
}

function moveStep(dice){
  let count=0;
  let interval=setInterval(()=>{
    if(count===dice){
      clearInterval(interval);
      afterMove();
      return;
    }

    if(positions[currentPlayer]<100){
      positions[currentPlayer]++;
      updateToken(currentPlayer);
    }

    count++;
  },200);
}

function afterMove(){
  let pos=positions[currentPlayer];

  if(snakesAndLadders[pos]){
    positions[currentPlayer]=snakesAndLadders[pos];
    updateToken(currentPlayer);
  }

  cutLogic();

  if(positions[currentPlayer]===100){
    alert(players[currentPlayer]+" Wins!");
    scores[currentPlayer]++;
    updateScore();
    moving=false;
    return;
  }

  currentPlayer=(currentPlayer+1)%4;
  updateTurn();
  moving=false;
}

function cutLogic(){
  for(let i=0;i<4;i++){
    if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
      positions[i]=1;
      updateToken(i);
    }
  }
}

function updateTurn(){
  document.getElementById("turn").innerText="Turn: "+players[currentPlayer];
}

function updateScore(){
  let html="<b>Score Board</b><br>";
  players.forEach((p,i)=>{
    html+=p+" : "+scores[i]+"<br>";
  });
  document.getElementById("score").innerHTML=html;
}

function restart(){
  positions=[1,1,1,1];
  currentPlayer=0;
  moving=false;
  for(let i=0;i<4;i++) updateToken(i);
  updateTurn();
}

window.onload=()=>{
  for(let i=0;i<4;i++) updateToken(i);
};

</script>

</body>
</html>
