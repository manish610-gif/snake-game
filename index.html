<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  width:100%;
  padding:20px;
}

/* BOARD */
#board{
  position:relative;
  width:95vmin;
  max-width:500px;
  aspect-ratio:1/1;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* TOKENS */
.player{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  border:2px solid white;
}

#p1{background:#ff6b6b;}
#p2{background:#4ecdc4;}
#p3{background:#ffe66d;}
#p4{background:#c77dff;}

/* PANEL */
.panel{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  color:white;
}

.panel h2{
  text-align:center;
  margin:0 0 15px 0;
  font-weight:700;
}

label{
  font-size:13px;
  font-weight:600;
}

select,input{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  border-radius:12px;
  border:none;
  outline:none;
  font-family:'Poppins', sans-serif;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  background:white;
  color:#333;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

#turn{
  text-align:center;
  margin-top:15px;
  font-weight:600;
  opacity:1;
  transition:opacity 0.4s ease;
}

/* SCOREBOARD */
#scoreBoard{
  margin-top:15px;
  font-size:14px;
}

/* 3D Dice */
.dice-container{
  width:80px;
  height:80px;
  margin:25px auto;
  perspective:800px;
}

.dice{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s ease;
}

.face{
  position:absolute;
  width:80px;
  height:80px;
  background:white;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
  color:#333;
  border:2px solid #ddd;
}

.front  { transform:rotateY(0deg) translateZ(40px); }
.back   { transform:rotateY(180deg) translateZ(40px); }
.right  { transform:rotateY(90deg) translateZ(40px); }
.left   { transform:rotateY(-90deg) translateZ(40px); }
.top    { transform:rotateX(90deg) translateZ(40px); }
.bottom { transform:rotateX(-90deg) translateZ(40px); }

/* WINNER POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.popup-content{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  animation:pop 0.3s ease;
}

@keyframes pop{
  0%{transform:scale(0.5);}
  100%{transform:scale(1);}
}

.popup.show{
  visibility:visible;
  opacity:1;
}

@media(min-width:900px){
  .wrapper{
    flex-direction:row;
    gap:40px;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div id="board">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
    <div id="p3" class="player"></div>
    <div id="p4" class="player"></div>
  </div>

  <div class="panel">
    <h2>Snake & Ladder</h2>

    <label>Select Players</label>
    <select id="playerCount" onchange="toggleInputs()">
      <option value="1">1 Player</option>
      <option value="2">2 Players</option>
      <option value="3">3 Players</option>
      <option value="4" selected>4 Players</option>
    </select>

    <input id="name1" placeholder="Player 1">
    <input id="name2" placeholder="Player 2">
    <input id="name3" placeholder="Player 3">
    <input id="name4" placeholder="Player 4">

    <button onclick="startGame()">Start Game</button>

    <div id="turn">Turn: -</div>

    <div id="scoreBoard"></div>

    <div class="dice-container">
      <div id="dice" class="dice">
        <div class="face front">1</div>
        <div class="face back">6</div>
        <div class="face right">3</div>
        <div class="face left">4</div>
        <div class="face top">2</div>
        <div class="face bottom">5</div>
      </div>
    </div>

    <button onclick="rollDice()">Roll Dice</button>
    <button onclick="restart()">Restart</button>

  </div>
</div>

<div class="popup" id="winnerPopup">
  <div class="popup-content">
    <h2 id="winnerText"></h2>
    <button onclick="closePopup()">Play Again</button>
  </div>
</div>

<script>

const snakesAndLadders={
  4:34,10:47,16:35,22:41,39:58,44:54,48:60,67:86,76:92,79:81,
  33:9,21:3,42:14,27:5,61:45,78:53,70:57,97:74,93:73
};

let players=[];
let positions=[1,1,1,1];
let scores=[0,0,0,0];
let currentPlayer=0;
let moving=false;
let totalPlayers=4;

function toggleInputs(){
  totalPlayers=parseInt(playerCount.value);
  for(let i=1;i<=4;i++){
    document.getElementById("name"+i).style.display=
      i<=totalPlayers ? "block" : "none";
  }
}

function startGame(){
  totalPlayers=parseInt(playerCount.value);
  players=[
    name1.value||"Player 1",
    name2.value||"Player 2",
    name3.value||"Player 3",
    name4.value||"Player 4"
  ];
  scores=[0,0,0,0];
  updateScores();
  currentPlayer=0;
  updateTurn();
}

function updateScores(){
  let board=document.getElementById("scoreBoard");
  let html="";
  for(let i=0;i<totalPlayers;i++){
    html+=`
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span>${players[i]}</span>
        <span>🏆 ${scores[i]}</span>
      </div>
    `;
  }
  board.innerHTML=html;
}

function rollDice(){
  if(moving||players.length===0) return;
  moving=true;

  let dice=Math.floor(Math.random()*6)+1;
  let diceEl=document.getElementById("dice");

  let rotations={
    1:"rotateX(0deg) rotateY(0deg)",
    2:"rotateX(-90deg)",
    3:"rotateY(-90deg)",
    4:"rotateY(90deg)",
    5:"rotateX(90deg)",
    6:"rotateY(180deg)"
  };

  diceEl.style.transform="rotateX(720deg) rotateY(720deg)";

  setTimeout(()=>{
    diceEl.style.transform=rotations[dice];
    moveStep(dice);
  },1000);
}

function getCoords(pos){
  const board=document.getElementById("board");
  const size=board.clientWidth;
  const cell=size/10;
  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;
  if(row%2===1) col=9-col;
  return{
    left:col*cell+(cell/2)-9,
    top:size-((row+1)*cell)+(cell/2)-9
  };
}

function updateToken(i){
  const t=document.getElementById("p"+(i+1));
  const c=getCoords(positions[i]);
  t.style.left=c.left+"px";
  t.style.top=c.top+"px";
}

function moveStep(dice){
  let count=0;
  let interval=setInterval(()=>{
    if(count===dice){
      clearInterval(interval);
      afterMove();
      return;
    }
    if(positions[currentPlayer]<100){
      positions[currentPlayer]++;
      updateToken(currentPlayer);
    }
    count++;
  },200);
}

function afterMove(){
  let pos=positions[currentPlayer];

  if(snakesAndLadders[pos]){
    positions[currentPlayer]=snakesAndLadders[pos];
    updateToken(currentPlayer);
  }

  cutLogic();

  if(positions[currentPlayer]===100){
    scores[currentPlayer]++;
    updateScores();
    showWinner(players[currentPlayer]);
    moving=false;
    return;
  }

  currentPlayer=(currentPlayer+1)%totalPlayers;
  updateTurn();
  moving=false;
}

function cutLogic(){
  for(let i=0;i<totalPlayers;i++){
    if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
      positions[i]=1;
      updateToken(i);
    }
  }
}

function updateTurn(){
  let turn=document.getElementById("turn");
  turn.style.opacity=0;
  setTimeout(()=>{
    turn.innerText="Turn: "+players[currentPlayer];
    turn.style.opacity=1;
  },200);
}

function restart(){
  positions=[1,1,1,1];
  currentPlayer=0;
  document.getElementById("dice").style.transform="rotateX(0deg) rotateY(0deg)";
  for(let i=0;i<4;i++) updateToken(i);
  updateTurn();
}

function showWinner(name){
  document.getElementById("winnerText").innerText=name+" Wins 🎉";
  document.getElementById("winnerPopup").classList.add("show");
}

function closePopup(){
  document.getElementById("winnerPopup").classList.remove("show");
  restart();
}

window.onload=()=>{
  toggleInputs();
  for(let i=0;i<4;i++) updateToken(i);
};

</script>

</body>
</html>
