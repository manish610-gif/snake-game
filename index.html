<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#E8A789; /* Updated aesthetic color */
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  padding:30px;
  min-height:100vh;
}

/* BOARD */
#board{
  position:relative;
  width:90vmin;
  max-width:650px;
  aspect-ratio:1/1;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:20px;
  border:6px solid #ffffff;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* TOKENS */
.player{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  z-index:5;
  border:2px solid white;
}

#p1{background:#ff4d6d;}
#p2{background:#4d79ff;}
#p3{background:#ffc300;}
#p4{background:#9b5de5;}

/* PANEL */
.panel{
  width:340px;
  background:#ffffff;
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
  border:2px solid #E8A789;
}

.panel h2{
  margin-top:0;
  text-align:center;
  color:#b86d56;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #d9a08d;
  outline:none;
}

input:focus{
  border-color:#b86d56;
}

/* BUTTON UPDATED */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:#E8A789;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#d68f74; /* Slight darker hover */
}

#turn{
  text-align:center;
  margin-top:12px;
  font-weight:bold;
  color:#444;
}

/* Dice */
.dice{
  width:80px;
  height:80px;
  margin:20px auto;
  background:#f7d1c4;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
  box-shadow:inset 0 0 15px rgba(0,0,0,0.1);
  transition:transform 0.4s ease;
}

.roll-anim{
  animation:spin 0.6s linear;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* Scoreboard grid */
.scoreboard{
  margin-top:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.scorebox{
  background:#fce5dc;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
  border:1px solid #E8A789;
  font-weight:600;
}

@media(max-width:1000px){
  .wrapper{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div id="board">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
    <div id="p3" class="player"></div>
    <div id="p4" class="player"></div>
  </div>

  <div class="panel">
    <h2>Snake & Ladder</h2>

    <input id="name1" placeholder="Player 1">
    <input id="name2" placeholder="Player 2">
    <input id="name3" placeholder="Player 3">
    <input id="name4" placeholder="Player 4">

    <button onclick="startGame()">Start Game</button>

    <div id="turn">Turn: -</div>

    <div id="dice" class="dice">🎲</div>

    <button onclick="rollDice()">Roll Dice</button>
    <button onclick="restart()">Restart</button>

    <div class="scoreboard">
      <div class="scorebox" id="score1">Player 1: 0</div>
      <div class="scorebox" id="score2">Player 2: 0</div>
      <div class="scorebox" id="score3">Player 3: 0</div>
      <div class="scorebox" id="score4">Player 4: 0</div>
    </div>

  </div>

</div>

<script>

const snakesAndLadders={
  04:34,10:47,16:35,22:41,39:58,44:54,48:60,67:86,76:92,79:81,
  33:09,21:03,42:14,27:05,61:45,78:53,70:57,97:74,93:73,70:57
};

let players=[];
let positions=[1,1,1,1];
let scores=[0,0,0,0];
let currentPlayer=0;
let moving=false;

function startGame(){
  players=[
    name1.value||"Player 1",
    name2.value||"Player 2",
    name3.value||"Player 3",
    name4.value||"Player 4"
  ];
  updateTurn();
  updateScore();
}

function getCoords(pos){
  const board=document.getElementById("board");
  const size=board.clientWidth;
  const cell=size/10;
  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;
  if(row%2===1) col=9-col;

  return{
    left:col*cell + (cell/2) - 9,
    top:size - ((row+1)*cell) + (cell/2) - 9
  };
}

function updateToken(i){
  const t=document.getElementById("p"+(i+1));
  const c=getCoords(positions[i]);
  t.style.left=c.left+"px";
  t.style.top=c.top+"px";
}

function rollDice(){
  if(moving || players.length===0) return;

  moving=true;
  let diceEl=document.getElementById("dice");
  diceEl.classList.add("roll-anim");

  let dice=Math.floor(Math.random()*6)+1;

  setTimeout(()=>{
    diceEl.classList.remove("roll-anim");
    diceEl.innerText=dice;
    moveStep(dice);
  },600);
}

function moveStep(dice){
  let count=0;
  let interval=setInterval(()=>{
    if(count===dice){
      clearInterval(interval);
      afterMove();
      return;
    }

    if(positions[currentPlayer]<100){
      positions[currentPlayer]++;
      updateToken(currentPlayer);
    }

    count++;
  },200);
}

function afterMove(){
  let pos=positions[currentPlayer];

  if(snakesAndLadders[pos]){
    positions[currentPlayer]=snakesAndLadders[pos];
    updateToken(currentPlayer);
  }

  cutLogic();

  if(positions[currentPlayer]===100){
    alert(players[currentPlayer]+" Wins!");
    scores[currentPlayer]++;
    updateScore();
    moving=false;
    return;
  }

  currentPlayer=(currentPlayer+1)%4;
  updateTurn();
  moving=false;
}

function cutLogic(){
  for(let i=0;i<4;i++){
    if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
      positions[i]=1;
      updateToken(i);
    }
  }
}

function updateTurn(){
  document.getElementById("turn").innerText="Turn: "+players[currentPlayer];
}

function updateScore(){
  score1.innerText=players[0]+" : "+scores[0];
  score2.innerText=players[1]+" : "+scores[1];
  score3.innerText=players[2]+" : "+scores[2];
  score4.innerText=players[3]+" : "+scores[3];
}

function restart(){
  positions=[1,1,1,1];
  currentPlayer=0;
  moving=false;
  for(let i=0;i<4;i++) updateToken(i);
  updateTurn();
}

window.onload=()=>{
  for(let i=0;i<4;i++) updateToken(i);
};

</script>

</body>
</html>
