<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake & Ladder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("dice-bg.jpg") no-repeat center center;
  background-size:cover;
  position:relative;
}
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(4px);
  z-index:0;
}
.wrapper{
  width:1200px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1;
}
#board{
  position:relative;
  width:700px;
  height:700px;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
.player{
  width:20px;
  height:20px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  border:3px solid white;
}
#p1{background:#ff6b6b;}
#p2{background:#4ecdc4;}
#p3{background:#ffe66d;}
#p4{background:#c77dff;}

.panel{
  width:350px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  color:white;
}
.panel h2{text-align:center;margin-bottom:20px;}
select{
  width:100%;
  height:34px;
  padding:0 12px;
  border-radius:14px;
  border:none;
  font-weight:600;
  background:rgba(255,255,255,0.9);
  margin-bottom:12px;
}
input{
  width:100%;
  height:24px;
  padding:0 8px;
  border-radius:10px;
  border:none;
  margin-bottom:5px;
  font-size:12px;
  font-weight:600;
  color:white;
}
#name1{background:#ff6b6b;}
#name2{background:#4ecdc4;}
#name3{background:#ffe66d;color:#333;}
#name4{background:#c77dff;}

button{
  width:100%;
  padding:10px;
  border-radius:16px;
  border:none;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  background:#00f5d4;
}
#turn{text-align:center;margin:15px 0;font-weight:600;}

.dice-container{
  width:80px;
  height:80px;
  margin:25px auto;
  perspective:800px;
}
.dice{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s ease;
}
.face{
  position:absolute;
  width:80px;
  height:80px;
  border-radius:18px;
  background:#fff;
}
.dot{
  position:absolute;
  width:12px;
  height:12px;
  background:#222;
  border-radius:50%;
}
.center{top:50%;left:50%;transform:translate(-50%,-50%);}
.tl{top:12px;left:12px;} .tr{top:12px;right:12px;}
.bl{bottom:12px;left:12px;} .br{bottom:12px;right:12px;}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
}
.popup.show{visibility:visible;}
.popup-content{
  background:white;
  padding:35px;
  border-radius:20px;
  text-align:center;
}

@keyframes blinkField{
  50%{box-shadow:0 0 15px white;}
}
.active-turn{
  animation:blinkField 1s infinite;
}
</style>
</head>

<body>

<audio id="diceSound" src="dice.mp3"></audio>
<audio id="snakeSound" src="snake.mp3"></audio>
<audio id="ladderSound" src="ladder.mp3"></audio>

<div class="wrapper">

<div id="board">
  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>
  <div id="p4" class="player"></div>
</div>

<div class="panel">
<h2>Snake & Ladder</h2>

<select id="playerCount" onchange="toggleInputs()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4" selected>4 Players</option>
</select>

<input id="name1" placeholder="P1">
<input id="name2" placeholder="P2">
<input id="name3" placeholder="P3">
<input id="name4" placeholder="P4">

<button onclick="startGame()">Start Game</button>

<div id="turn">Turn: -</div>

<div class="dice-container">
  <div id="dice" class="dice">
    <div class="face front"><span class="dot center"></span></div>
  </div>
</div>

<button onclick="rollDice()">Roll Dice</button>
<button onclick="restart()">Restart</button>
</div>
</div>

<div class="popup" id="winnerPopup">
  <div class="popup-content">
    <h2 id="winnerText"></h2>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
const snakesAndLadders={
  5:35,11:48,17:36,23:42,40:59,45:55,49:70,63:84,71:89,74:93,
  98:76,94:77,72:54,80:58,66:57,69:46,43:15,34:10,28:6,22:4
};

let players=[];
let positions=[1,1,1,1];
let currentPlayer=0;
let moving=false;
let totalPlayers=4;

let lastDice=0;
let sixCount=0;
let startPosition=0;

function toggleInputs(){
  totalPlayers=parseInt(playerCount.value);
  for(let i=1;i<=4;i++)
    document.getElementById("name"+i).style.display=i<=totalPlayers?"block":"none";
}

function startGame(){
  players=[name1.value||"P1",name2.value||"P2",name3.value||"P3",name4.value||"P4"];
  currentPlayer=0;
  updateTurn();
}

function rollDice(){
  if(moving)return;
  moving=true;
  lastDice=Math.floor(Math.random()*6)+1;
  document.getElementById("diceSound").play();
  moveStep(lastDice);
}

function getCoords(pos){
  const board=document.getElementById("board");
  const cell=board.offsetWidth/10;
  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;
  if(row%2) col=9-col;
  return{
    left:col*cell+cell/2-10,
    top:(9-row)*cell+cell/2-10
  };
}

function updateToken(i){
  const t=document.getElementById("p"+(i+1));
  const c=getCoords(positions[i]);
  t.style.left=c.left+"px";
  t.style.top=c.top+"px";
}

function moveStep(dice){
  if(positions[currentPlayer]+dice>100){
    afterMove();
    return;
  }
  let c=0;
  let interval=setInterval(()=>{
    if(c===dice){
      clearInterval(interval);
      afterMove();
      return;
    }
    positions[currentPlayer]++;
    updateToken(currentPlayer);
    c++;
  },200);
}

function afterMove(){
  let pos=positions[currentPlayer];
  if(snakesAndLadders[pos]){
    positions[currentPlayer]=snakesAndLadders[pos];
    updateToken(currentPlayer);
  }

  if(lastDice===6){
    sixCount++;
    if(sixCount===1) startPosition=pos;
    if(sixCount===3){
      positions[currentPlayer]=startPosition;
      updateToken(currentPlayer);
      sixCount=0;
      currentPlayer=(currentPlayer+1)%totalPlayers;
    }
  }else{
    sixCount=0;
    currentPlayer=(currentPlayer+1)%totalPlayers;
  }

  if(positions[currentPlayer]===100){
    showWinner(players[currentPlayer]);
    return;
  }

  updateTurn();
  moving=false;
}

function updateTurn(){
  document.getElementById("turn").innerText="Turn: "+players[currentPlayer];
  for(let i=1;i<=4;i++)
    document.getElementById("name"+i).classList.remove("active-turn");
  document.getElementById("name"+(currentPlayer+1)).classList.add("active-turn");
}

function restart(){
  positions=[1,1,1,1];
  currentPlayer=0;
  updateTurn();
  for(let i=0;i<4;i++) updateToken(i);
}

function showWinner(name){
  winnerText.innerText=name+" Wins 🎉";
  winnerPopup.classList.add("show");
}
function closePopup(){
  winnerPopup.classList.remove("show");
  restart();
}

window.onload=()=>{toggleInputs();restart();}
</script>

</body>
</html>
