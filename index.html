<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder - 4 Player</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef5ef;
}

.container{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  gap:20px;
}

#gameBoard{
  position:relative;
  width:600px;
  height:600px;
  background:url("board.png");
  background-size:cover;
  border:4px solid #2c6e2f;
}

.player{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  z-index:5;
}

#p1{background:red;}
#p2{background:blue;}
#p3{background:yellow;}
#p4{background:purple;}

.panel{
  width:300px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:6px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

#diceBox{
  font-size:50px;
  text-align:center;
  margin:10px 0;
}

#scoreBoard{
  margin-top:15px;
  font-size:14px;
}

@media(max-width:950px){
  .container{
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="gameBoard">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
    <div id="p3" class="player"></div>
    <div id="p4" class="player"></div>
  </div>

  <div class="panel">

    <h3>Snake & Ladder</h3>

    <input id="name1" placeholder="Player 1">
    <input id="name2" placeholder="Player 2">
    <input id="name3" placeholder="Player 3">
    <input id="name4" placeholder="Player 4">

    <button onclick="startGame()">Start Game</button>

    <div id="turnInfo"></div>

    <div id="diceBox">🎲</div>

    <button onclick="rollDice()">Roll Dice</button>
    <button onclick="restartGame()">Restart</button>

    <div id="scoreBoard"></div>

  </div>

</div>

<script>

const snakesAndLadders={
  4:14,5:35,12:32,17:36,40:59,54:93,
  68:88,74:97,82:91,
  71:70,75:66,79:52,63:48,
  43:23,22:2,18:3,34:28,65:55
};

let players=[];
let positions=[0,0,0,0];
let scores=[0,0,0,0];
let currentPlayer=0;
let moving=false;

function startGame(){
  players=[
    name1.value||"Player 1",
    name2.value||"Player 2",
    name3.value||"Player 3",
    name4.value||"Player 4"
  ];
  updateTurn();
  updateScore();
}

function getCoords(pos){
  if(pos===0) return {left:-30,top:550};

  const size=600;
  const cell=size/10;

  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;

  if(row%2===1) col=9-col;

  return{
    left:col*cell+8,
    top:size-((row+1)*cell)+8
  };
}

function updateToken(i){
  let t=document.getElementById("p"+(i+1));
  let c=getCoords(positions[i]);
  t.style.left=c.left+"px";
  t.style.top=c.top+"px";
}

function rollDice(){
  if(moving) return;

  let dice=Math.floor(Math.random()*6)+1;
  document.getElementById("diceBox").innerText=dice;
  moveSteps(dice);
}

function moveSteps(dice){
  moving=true;

  let steps=0;
  let interval=setInterval(()=>{

    if(steps===dice){
      clearInterval(interval);
      afterMove();
      return;
    }

    if(positions[currentPlayer]<100){
      positions[currentPlayer]++;
      updateToken(currentPlayer);
    }

    steps++;

  },250);
}

function afterMove(){

  let pos=positions[currentPlayer];

  if(snakesAndLadders[pos]){
    positions[currentPlayer]=snakesAndLadders[pos];
    updateToken(currentPlayer);
  }

  cutOpponent();

  if(positions[currentPlayer]===100){
    alert(players[currentPlayer]+" Wins!");
    scores[currentPlayer]++;
    updateScore();
    moving=false;
    return;
  }

  currentPlayer=(currentPlayer+1)%4;
  updateTurn();
  moving=false;
}

function cutOpponent(){
  for(let i=0;i<4;i++){
    if(i!==currentPlayer && positions[i]===positions[currentPlayer] && positions[i]!==0){
      positions[i]=0;
      updateToken(i);
      alert(players[currentPlayer]+" cut "+players[i]);
    }
  }
}

function updateTurn(){
  turnInfo.innerHTML="<b>Turn: "+players[currentPlayer]+"</b>";
}

function updateScore(){
  let html="<b>Score Board</b><br>";
  players.forEach((p,i)=>{
    html+=p+" : "+scores[i]+"<br>";
  });
  scoreBoard.innerHTML=html;
}

function restartGame(){
  positions=[0,0,0,0];
  currentPlayer=0;
  for(let i=0;i<4;i++) updateToken(i);
  updateTurn();
}

for(let i=0;i<4;i++) updateToken(i);

</script>

</body>
</html>
