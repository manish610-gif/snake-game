<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake & Ladder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#5f6caf,#8e54e9);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.wrapper{
  width:1400px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BOARD */
#board{
  position:relative;
  width:850px;
  height:850px;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

.player{
  width:22px;
  height:22px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  border:3px solid white;
}

#p1{background:#ff6b6b;}
#p2{background:#4ecdc4;}
#p3{background:#ffe66d;}
#p4{background:#c77dff;}

/* PANEL */
.panel{
  width:400px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  color:white;
}

.panel h2{
  text-align:center;
  font-weight:700;
  margin-bottom:20px;
}

/* SHORT INPUT FIELDS */
select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  margin-bottom:12px;
  font-family:'Poppins',sans-serif;
}

input{
  width:70%;
  padding:8px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  font-family:'Poppins',sans-serif;
}

/* BUTTON STYLE */
button{
  width:100%;
  padding:14px;
  border-radius:18px;
  border:none;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
  background:#00f5d4;
  color:#111;
  transition:0.2s;
  box-shadow:0 0 10px #00f5d4;
}

/* Hover effect */
button:hover{
  background:#00e6c7;
}

/* CLICK BLINK EFFECT */
button:active{
  animation:blink 0.4s ease;
}

@keyframes blink{
  0%{box-shadow:0 0 5px #00f5d4;}
  50%{box-shadow:0 0 25px #00f5d4;}
  100%{box-shadow:0 0 5px #00f5d4;}
}

#turn{
  text-align:center;
  margin:15px 0;
  font-weight:600;
  transition:opacity 0.3s ease;
}

#scoreBoard{
  margin-bottom:15px;
}

/* DICE */
.dice-container{
  width:90px;
  height:90px;
  margin:30px auto;
  perspective:800px;
}

.dice{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s ease;
}

.face{
  position:absolute;
  width:90px;
  height:90px;
  background:white;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:700;
  color:#333;
  border:2px solid #ddd;
}

.front  { transform:rotateY(0deg) translateZ(45px); }
.back   { transform:rotateY(180deg) translateZ(45px); }
.right  { transform:rotateY(90deg) translateZ(45px); }
.left   { transform:rotateY(-90deg) translateZ(45px); }
.top    { transform:rotateX(90deg) translateZ(45px); }
.bottom { transform:rotateX(-90deg) translateZ(45px); }

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.popup.show{
  visibility:visible;
  opacity:1;
}

.popup-content{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<div id="board">
  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>
  <div id="p4" class="player"></div>
</div>

<div class="panel">

<h2>Snake & Ladder</h2>

<select id="playerCount" onchange="toggleInputs()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4" selected>4 Players</option>
</select>

<input id="name1" placeholder="P1">
<input id="name2" placeholder="P2">
<input id="name3" placeholder="P3">
<input id="name4" placeholder="P4">

<button onclick="startGame()">Start Game</button>

<div id="turn">Turn: -</div>

<div id="scoreBoard"></div>

<div class="dice-container">
<div id="dice" class="dice">
<div class="face front">1</div>
<div class="face back">6</div>
<div class="face right">3</div>
<div class="face left">4</div>
<div class="face top">2</div>
<div class="face bottom">5</div>
</div>
</div>

<button onclick="rollDice()">Roll Dice</button>
<button onclick="restart()">Restart</button>

</div>
</div>

<div class="popup" id="winnerPopup">
<div class="popup-content">
<h2 id="winnerText"></h2>
<button onclick="closePopup()">Play Again</button>
</div>
</div>

<script>
/* SAME GAME LOGIC AS BEFORE — NO CHANGES */
const snakesAndLadders={
4:34,10:47,16:35,22:41,39:58,44:54,48:60,67:86,76:92,79:81,
33:9,21:3,42:14,27:5,61:45,78:53,70:57,97:74,93:73
};

let players=[];
let positions=[1,1,1,1];
let scores=[0,0,0,0];
let currentPlayer=0;
let moving=false;
let totalPlayers=4;

function toggleInputs(){
totalPlayers=parseInt(playerCount.value);
for(let i=1;i<=4;i++){
document.getElementById("name"+i).style.display=
i<=totalPlayers?"block":"none";
}
}

function startGame(){
totalPlayers=parseInt(playerCount.value);
players=[
name1.value||"Player 1",
name2.value||"Player 2",
name3.value||"Player 3",
name4.value||"Player 4"
];
scores=[0,0,0,0];
updateScores();
currentPlayer=0;
updateTurn();
}

function updateScores(){
let html="";
for(let i=0;i<totalPlayers;i++){
html+=`<div style="display:flex;justify-content:space-between;margin-bottom:6px;">
<span>${players[i]}</span>
<span>🏆 ${scores[i]}</span></div>`;
}
scoreBoard.innerHTML=html;
}

function rollDice(){
if(moving||players.length===0) return;
moving=true;
let dice=Math.floor(Math.random()*6)+1;
let diceEl=document.getElementById("dice");

let rotations={
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateX(-90deg)",
3:"rotateY(-90deg)",
4:"rotateY(90deg)",
5:"rotateX(90deg)",
6:"rotateY(180deg)"
};

diceEl.style.transform=rotations[dice];
setTimeout(()=>moveStep(dice),800);
}

function getCoords(pos){
const size=850;
const cell=size/10;
let row=Math.floor((pos-1)/10);
let col=(pos-1)%10;
if(row%2===1) col=9-col;
return{
left:col*cell+(cell/2)-11,
top:size-((row+1)*cell)+(cell/2)-11
};
}

function updateToken(i){
const t=document.getElementById("p"+(i+1));
const c=getCoords(positions[i]);
t.style.left=c.left+"px";
t.style.top=c.top+"px";
}

function moveStep(dice){
let count=0;
let interval=setInterval(()=>{
if(count===dice){
clearInterval(interval);
afterMove();
return;
}
if(positions[currentPlayer]<100){
positions[currentPlayer]++;
updateToken(currentPlayer);
}
count++;
},200);
}

function afterMove(){
let pos=positions[currentPlayer];
if(snakesAndLadders[pos]){
positions[currentPlayer]=snakesAndLadders[pos];
updateToken(currentPlayer);
}
cutLogic();
if(positions[currentPlayer]===100){
scores[currentPlayer]++;
updateScores();
showWinner(players[currentPlayer]);
moving=false;
return;
}
currentPlayer=(currentPlayer+1)%totalPlayers;
updateTurn();
moving=false;
}

function cutLogic(){
for(let i=0;i<totalPlayers;i++){
if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
positions[i]=1;
updateToken(i);
}
}
}

function updateTurn(){
turn.style.opacity=0;
setTimeout(()=>{
turn.innerText="Turn: "+players[currentPlayer];
turn.style.opacity=1;
},200);
}

function restart(){
positions=[1,1,1,1];
currentPlayer=0;
for(let i=0;i<4;i++) updateToken(i);
updateTurn();
}

function showWinner(name){
winnerText.innerText=name+" Wins 🎉";
winnerPopup.classList.add("show");
}

function closePopup(){
winnerPopup.classList.remove("show");
restart();
}

window.onload=()=>{
toggleInputs();
for(let i=0;i<4;i++) updateToken(i);
};
</script>

</body>
</html>
