<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Snake & Ladder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("dice-bg.jpg") no-repeat center center;
background-size:cover;
position:relative;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(4px);
z-index:0;
}
.front  { transform:rotateY(0deg) translateZ(40px); }
.back   { transform:rotateY(180deg) translateZ(40px); }
.right  { transform:rotateY(90deg) translateZ(40px); }
.left   { transform:rotateY(-90deg) translateZ(40px); }
.top    { transform:rotateX(90deg) translateZ(40px); }
.bottom { transform:rotateX(-90deg) translateZ(40px); }
  
.wrapper{
width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
z-index:1;
}

#board{
position:relative;
width:700px;
height:700px;
background:url("board.png") no-repeat center;
background-size:contain;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.player{
width:20px;
height:20px;
border-radius:50%;
position:absolute;
transition:0.25s linear;
border:3px solid white;
}

#p1{background:#ff6b6b;}
#p2{background:#4ecdc4;}
#p3{background:#ffe66d;}
#p4{background:#c77dff;}

.panel{
width:350px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
color:white;
}

.panel h2{
text-align:center;
margin-bottom:20px;
}

select{
width:100%;
height:34px;
border-radius:14px;
border:none;
margin-bottom:12px;
}

input{
width:100%;
height:24px;
border-radius:10px;
border:none;
margin-bottom:5px;
font-size:12px;
font-weight:600;
color:white;
}

#name1{background:#ff6b6b;}
#name2{background:#4ecdc4;}
#name3{background:#ffe66d;color:#333;}
#name4{background:#c77dff;}

button{
width:100%;
padding:10px;
border-radius:16px;
border:none;
font-weight:600;
cursor:pointer;
margin-top:10px;
background:#00f5d4;
}

#turn{
text-align:center;
margin:15px 0;
font-weight:600;
}

.dice-container{
width:80px;
height:80px;
margin:25px auto;
perspective:800px;
}

.dice{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 1s ease;
}

.face{
position:absolute;
width:80px;
height:80px;
border-radius:18px;
background:#fff;
}
/* Dice dots */
.dot{
  position:absolute;
  width:12px;
  height:12px;
  background:#222;
  border-radius:50%;
}

/* Dot positions */
.tl{ top:12px; left:12px; }
.tr{ top:12px; right:12px; }
.ml{ top:50%; left:12px; transform:translateY(-50%); }
.mr{ top:50%; right:12px; transform:translateY(-50%); }
.bl{ bottom:12px; left:12px; }
.br{ bottom:12px; right:12px; }
.center{ top:50%; left:50%; transform:translate(-50%,-50%); }
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
z-index:9999;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-content{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
}

@keyframes blinkField{
0%{box-shadow:0 0 0 rgba(255,255,255,0);}
50%{box-shadow:0 0 15px rgba(255,255,255,0.9);}
100%{box-shadow:0 0 0 rgba(255,255,255,0);}
}

.active-turn{
animation:blinkField 1s infinite;
}

</style>

</head>

<body>

<audio id="diceSound" src="dice.mp3"></audio> <audio id="snakeSound" src="snake.mp3"></audio> <audio id="ladderSound" src="ladder.mp3"></audio>

<div class="wrapper">

<div id="board">
<div id="p1" class="player"></div>
<div id="p2" class="player"></div>
<div id="p3" class="player"></div>
<div id="p4" class="player"></div>
</div>

<div class="panel">

<h2>Snake & Ladder</h2>

<select id="playerCount" onchange="toggleInputs()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4" selected>4 Players</option>
</select>

<input id="name1" placeholder="P1">
<input id="name2" placeholder="P2">
<input id="name3" placeholder="P3">
<input id="name4" placeholder="P4">

<button onclick="startGame()">Start Game</button>

<div id="turn">Turn: -</div>

<div class="dice-container">
<div id="dice" class="dice">

<div class="face front">
<span class="dot center"></span>
</div>

<div class="face back">
<span class="dot tl"></span>
<span class="dot tr"></span>
<span class="dot ml"></span>
<span class="dot mr"></span>
<span class="dot bl"></span>
<span class="dot br"></span>
</div>

<div class="face right">
<span class="dot tl"></span>
<span class="dot center"></span>
<span class="dot br"></span>
</div>

<div class="face left">
<span class="dot tl"></span>
<span class="dot tr"></span>
<span class="dot bl"></span>
<span class="dot br"></span>
</div>

<div class="face top">
<span class="dot tl"></span>
<span class="dot tr"></span>
</div>

<div class="face bottom">
<span class="dot tl"></span>
<span class="dot tr"></span>
<span class="dot center"></span>
<span class="dot bl"></span>
<span class="dot br"></span>
</div>

</div>
</div>

<button onclick="rollDice()">Roll Dice</button> <button onclick="restart()">Restart</button>

</div>
</div>

<div class="popup" id="winnerPopup">
<div class="popup-content">
<h2 id="winnerText"></h2>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

const snakesAndLadders={
5:35,11:48,17:36,23:42,40:59,45:55,49:70,63:84,71:89,74:93,
98:76,94:77,72:54,80:58,66:57,69:46,43:15,34:10,28:6,22:4
};

let players=[];
let positions=[1,1,1,1];
let currentPlayer=0;
let moving=false;
let totalPlayers=4;

function toggleInputs(){
totalPlayers=parseInt(playerCount.value);
for(let i=1;i<=4;i++){
document.getElementById("name"+i).style.display=i<=totalPlayers?"block":"none";
}
}

function startGame(){
players=[
name1.value||"Player 1",
name2.value||"Player 2",
name3.value||"Player 3",
name4.value||"Player 4"
];
currentPlayer=0;
updateTurn();
}

function rollDice(){

if(moving || players.length===0) return;

moving=true;

let dice=Math.floor(Math.random()*6)+1;

document.getElementById("diceSound").play();

let diceEl=document.getElementById("dice");

const baseRotation = {
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateX(-90deg) rotateY(0deg)",
3:"rotateX(0deg) rotateY(-90deg)",
4:"rotateX(0deg) rotateY(90deg)",
5:"rotateX(90deg) rotateY(0deg)",
6:"rotateX(0deg) rotateY(180deg)"
};

let spinX=720;
let spinY=720;

diceEl.style.transform =
baseRotation[dice] +
` rotateX(${spinX}deg) rotateY(${spinY}deg)`;

setTimeout(()=>moveStep(dice),1000);

}

function moveStep(dice){

/* exact finish rule */
if(positions[currentPlayer] + dice > 100){
afterMove(dice);
return;
}

let count=0;

let interval=setInterval(()=>{

if(count===dice){
clearInterval(interval);
afterMove(dice);
return;
}

positions[currentPlayer]++;
updateToken(currentPlayer);

count++;

},200);

}

function afterMove(dice){

let pos=positions[currentPlayer];

if(snakesAndLadders[pos]){
if(snakesAndLadders[pos]>pos) ladderSound.play();
else snakeSound.play();

positions[currentPlayer]=snakesAndLadders[pos];
updateToken(currentPlayer);
}

cutLogic();

if(positions[currentPlayer]===100){
showWinner(players[currentPlayer]);
moving=false;
return;
}

if(dice!==6){
currentPlayer=(currentPlayer+1)%totalPlayers;
}

updateTurn();
moving=false;

}

function getCoords(pos){

const board=document.getElementById("board");
const boardWidth=board.offsetWidth;
const boardHeight=board.offsetHeight;

const gridTopOffset=85;
const gridBottomOffset=20;

const gridHeight=boardHeight-gridTopOffset-gridBottomOffset;

const cellWidth=boardWidth/10;
const cellHeight=gridHeight/10;

let row=Math.floor((pos-1)/10);
let col=(pos-1)%10;

if(row%2===1) col=9-col;

return{
left:col*cellWidth+(cellWidth/2)-10,
top:gridTopOffset+(9-row)*cellHeight+(cellHeight/2)-13
};

}

function updateToken(i){
const t=document.getElementById("p"+(i+1));
const c=getCoords(positions[i]);
t.style.left=c.left+"px";
t.style.top=c.top+"px";
}

function cutLogic(){
for(let i=0;i<totalPlayers;i++){
if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
positions[i]=1;
updateToken(i);
}
}
}

function updateTurn(){

const turnEl=document.getElementById("turn");
turnEl.innerText="Turn: "+players[currentPlayer];

for(let i=1;i<=4;i++){
document.getElementById("name"+i).classList.remove("active-turn");
}

document.getElementById("name"+(currentPlayer+1)).classList.add("active-turn");

}

function restart(){
positions=[1,1,1,1];
currentPlayer=0;
for(let i=0;i<4;i++) updateToken(i);
updateTurn();
}

function showWinner(name){
winnerText.innerText=name+" Wins 🎉";
winnerPopup.classList.add("show");
}

function closePopup(){
winnerPopup.classList.remove("show");
restart();
}

window.onload=()=>{
toggleInputs();
for(let i=0;i<4;i++) updateToken(i);
};

</script>

</body>
</html>
