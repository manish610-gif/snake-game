<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake & Ladder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("dice-bg.jpg") no-repeat center center;
  background-size:cover;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(4px);
  z-index:0;
}

.wrapper{
  width:1200px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1;
}

#board{
  position:relative;
  width:700px;
  height:700px;
  background:url("board.png") no-repeat center;
  background-size:contain;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.player{
  width:20px;
  height:20px;
  border-radius:50%;
  position:absolute;
  transition:0.25s linear;
  border:3px solid white;
}

#p1{background:#ff6b6b;}
#p2{background:#4ecdc4;}
#p3{background:#ffe66d;}
#p4{background:#c77dff;}

.panel{
  width:350px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  color:white;
}

.panel h2{
  text-align:center;
  margin-bottom:20px;
}

select{
  width:100%;
  height:34px;
  padding:0 12px;
  border-radius:14px;
  border:none;
  font-family:'Poppins',sans-serif;
  font-weight:600;
  font-size:13px;
  background:rgba(255,255,255,0.9);
  color:#333;
  cursor:pointer;
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg fill='%23333' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
  background-size:16px;
  margin-bottom:12px;
}

input{
  width:100%;
  height:24px;
  padding:0 8px;
  border-radius:10px;
  border:none;
  margin-bottom:5px;
  font-size:12px;
  font-family:'Poppins',sans-serif;
  font-weight:600;
  color:white;
  box-sizing:border-box;
}

#name1{ background:#ff6b6b; }
#name2{ background:#4ecdc4; }
#name3{ background:#ffe66d; color:#333; }
#name4{ background:#c77dff; }

button{
  width:100%;
  padding:10px;
  border-radius:16px;
  border:none;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  background:#00f5d4;
}

#turn{
  text-align:center;
  margin:15px 0;
  font-weight:600;
}
</style>
</head>

<body>

<div class="wrapper">

<div id="board">
  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>
  <div id="p4" class="player"></div>
</div>

<div class="panel">
<h2>Snake & Ladder</h2>

<select id="playerCount" onchange="toggleInputs()">
<option value="1">1 Player</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4" selected>4 Players</option>
</select>

<input id="name1" placeholder="P1">
<input id="name2" placeholder="P2">
<input id="name3" placeholder="P3">
<input id="name4" placeholder="P4">

<button onclick="startGame()">Start Game</button>

<div id="turn">Turn: -</div>

<button onclick="rollDice()">Roll Dice</button>
<button onclick="restart()">Restart</button>
</div>
</div>

<script>

const snakesAndLadders = {

  5:35,
  11:48,
  17:36,
  23:42,
  40:59,
  45:55,
  49:70,
  63:84,
  71:89,
  74:93,

  98:76,
  94:77,
  72:54,
  80:58,
  66:57,
  69:46,
  43:15,
  34:10,
  28:6,
  22:4
};

let players=[];
let positions=[1,1,1,1];
let currentPlayer=0;
let moving=false;
let totalPlayers=4;

function toggleInputs(){
totalPlayers=parseInt(playerCount.value);
for(let i=1;i<=4;i++){
document.getElementById("name"+i).style.display=
i<=totalPlayers?"block":"none";
}
}

function startGame(){
totalPlayers=parseInt(playerCount.value);
players=[
name1.value||"Player 1",
name2.value||"Player 2",
name3.value||"Player 3",
name4.value||"Player 4"
];
currentPlayer=0;
updateTurn();
}

function rollDice(){
if(moving || players.length===0) return;
moving=true;

let dice=Math.floor(Math.random()*6)+1;
setTimeout(()=>moveStep(dice),500);
}

function getCoords(pos){
const board=document.getElementById("board");
const boardWidth=board.offsetWidth;
const boardHeight=board.offsetHeight;

const gridTopOffset=85;
const gridBottomOffset=30;

const gridHeight=boardHeight-gridTopOffset-gridBottomOffset;
const cellWidth=boardWidth/10;
const cellHeight=gridHeight/10;

let row=Math.floor((pos-1)/10);
let col=(pos-1)%10;

if(row%2===1) col=9-col;

return{
left:col*cellWidth+(cellWidth/2)-(20/2),
top:gridTopOffset+(9-row)*cellHeight+(cellHeight/2)-(20/2)
};
}

function updateToken(i){
const t=document.getElementById("p"+(i+1));
const c=getCoords(positions[i]);
t.style.left=c.left+"px";
t.style.top=c.top+"px";
}

function moveStep(dice){
let count=0;
let interval=setInterval(()=>{
if(count===dice){
clearInterval(interval);
afterMove();
return;
}
if(positions[currentPlayer]<100){
positions[currentPlayer]++;
updateToken(currentPlayer);
}
count++;
},200);
}

function afterMove(){
let pos=positions[currentPlayer];

if(snakesAndLadders[pos]){
positions[currentPlayer]=snakesAndLadders[pos];
updateToken(currentPlayer);
}

cutLogic();

if(positions[currentPlayer]===100){
alert(players[currentPlayer]+" Wins 🎉");
moving=false;
return;
}

currentPlayer=(currentPlayer+1)%totalPlayers;
updateTurn();
moving=false;
}

function cutLogic(){
for(let i=0;i<totalPlayers;i++){
if(i!==currentPlayer && positions[i]===positions[currentPlayer]){
positions[i]=1;
updateToken(i);
}
}
}

function updateTurn(){
const turnEl=document.getElementById("turn");
turnEl.innerText="Turn: "+players[currentPlayer];
const colors=["#ff6b6b","#4ecdc4","#ffe66d","#c77dff"];
turnEl.style.color=colors[currentPlayer];
}

function restart(){
positions=[1,1,1,1];
currentPlayer=0;
for(let i=0;i<4;i++) updateToken(i);
updateTurn();
}

window.onload=()=>{
toggleInputs();
for(let i=0;i<4;i++) updateToken(i);
};

</script>

</body>
</html>
