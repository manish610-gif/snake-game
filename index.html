<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder Pro</title>

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  background:#eef5ef;
  margin:0;
}

h2{margin-top:10px;}

#setup{
  margin:15px;
}

input{
  padding:8px;
  margin:5px;
  width:140px;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

#statusPanel{
  display:none;
  background:white;
  padding:10px;
  margin:10px auto;
  border-radius:8px;
  width:90%;
  max-width:500px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#game-container{
  position:relative;
  width:90vw;
  max-width:600px;
  height:90vw;
  max-height:600px;
  margin:20px auto;
}

#board{
  width:100%;
  height:100%;
  background:url('board.png');
  background-size:cover;
  border:4px solid #2c6e2f;
}

.player{
  width:20px;
  height:20px;
  border-radius:50%;
  position:absolute;
  transition:all 0.4s ease;
  z-index:5;
}

#p1{background:red;}
#p2{background:blue;}
#p3{background:yellow;}
#p4{background:purple;}

/* 3D Dice */
.scene{
  width:80px;
  height:80px;
  margin:15px auto;
  perspective:600px;
}

.cube{
  width:80px;
  height:80px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.face{
  position:absolute;
  width:80px;
  height:80px;
  background:white;
  border:2px solid #333;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.front{transform:rotateY(0deg) translateZ(40px);}
.back{transform:rotateY(180deg) translateZ(40px);}
.right{transform:rotateY(90deg) translateZ(40px);}
.left{transform:rotateY(-90deg) translateZ(40px);}
.top{transform:rotateX(90deg) translateZ(40px);}
.bottom{transform:rotateX(-90deg) translateZ(40px);}

#scoreBoard{
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Snake & Ladder - 4 Player</h2>

<div id="setup">
  <input id="name1" placeholder="Player 1 Name">
  <input id="name2" placeholder="Player 2 Name">
  <input id="name3" placeholder="Player 3 Name">
  <input id="name4" placeholder="Player 4 Name">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="statusPanel">
  <div id="turnDisplay"></div>

  <div class="scene">
    <div class="cube" id="cube">
      <div class="face front">1</div>
      <div class="face back">6</div>
      <div class="face right">3</div>
      <div class="face left">4</div>
      <div class="face top">5</div>
      <div class="face bottom">2</div>
    </div>
  </div>

  <button onclick="rollDice()">Roll Dice 🎲</button>
  <button onclick="restartGame()">Restart</button>

  <div id="scoreBoard"></div>
</div>

<div id="game-container">
  <div id="board"></div>
  <div id="p1" class="player"></div>
  <div id="p2" class="player"></div>
  <div id="p3" class="player"></div>
  <div id="p4" class="player"></div>
</div>

<script>

/* SAFE SOUND LOADER (won't break if files missing) */
function loadSound(file){
  try{
    return new Audio(file);
  }catch{
    return {play:()=>{}};
  }
}

const diceSound = loadSound("dice.mp3");
const snakeSound = loadSound("snake.mp3");
const ladderSound = loadSound("ladder.mp3");
const winSound = loadSound("win.mp3");

/* Your exact board mapping */
const snakesAndLadders={
  4:14,5:35,12:32,17:36,40:59,54:93,
  68:88,74:97,82:91,
  71:70,75:66,79:52,63:48,
  43:23,22:2,18:3,34:28,65:55
};

let positions=[1,1,1,1];
let scores=[0,0,0,0];
let players=[];
let currentPlayer=0;
let gameOver=false;

function startGame(){
  players=[
    name1.value||"Player 1",
    name2.value||"Player 2",
    name3.value||"Player 3",
    name4.value||"Player 4"
  ];

  document.getElementById("setup").style.display="none";
  document.getElementById("statusPanel").style.display="block";

  updateTurn();
  updateScore();
}

function getCoordinates(pos){
  const boardSize=document.getElementById("game-container").offsetWidth;
  const cellSize=boardSize/10;
  let row=Math.floor((pos-1)/10);
  let col=(pos-1)%10;
  if(row%2===1) col=9-col;
  return{
    left:col*cellSize+5,
    top:boardSize-((row+1)*cellSize)+5
  };
}

function updatePlayer(i){
  let token=document.getElementById("p"+(i+1));
  let c=getCoordinates(positions[i]);
  token.style.left=c.left+"px";
  token.style.top=c.top+"px";
}

function rollDice(){
  if(gameOver) return;

  diceSound.play();

  let dice=Math.floor(Math.random()*6)+1;
  let cube=document.getElementById("cube");

  const rotations={
    1:"rotateX(0deg) rotateY(0deg)",
    2:"rotateX(-90deg)",
    3:"rotateY(-90deg)",
    4:"rotateY(90deg)",
    5:"rotateX(90deg)",
    6:"rotateY(180deg)"
  };

  cube.style.transform=rotations[dice];

  setTimeout(()=>movePlayer(dice),1000);
}

function movePlayer(dice){
  let newPos=positions[currentPlayer]+dice;
  if(newPos<=100){
    positions[currentPlayer]=newPos;

    if(snakesAndLadders[newPos]){
      if(snakesAndLadders[newPos]>newPos){
        ladderSound.play();
      }else{
        snakeSound.play();
      }
      positions[currentPlayer]=snakesAndLadders[newPos];
    }
  }

  updatePlayer(currentPlayer);

  if(positions[currentPlayer]===100){
    winSound.play();
    alert(players[currentPlayer]+" Wins!");
    scores[currentPlayer]++;
    updateScore();
    gameOver=true;
    return;
  }

  currentPlayer=(currentPlayer+1)%4;
  updateTurn();
}

function updateTurn(){
  turnDisplay.innerText="Turn: "+players[currentPlayer];
}

function updateScore(){
  let html="<b>Score Board</b><br>";
  players.forEach((p,i)=>{
    html+=p+" : "+scores[i]+"<br>";
  });
  scoreBoard.innerHTML=html;
}

function restartGame(){
  positions=[1,1,1,1];
  currentPlayer=0;
  gameOver=false;
  for(let i=0;i<4;i++) updatePlayer(i);
  updateTurn();
}

for(let i=0;i<4;i++) updatePlayer(i);

</script>

</body>

</html>
